global:
  namespace: frida-car-claims-dev
  partOf: frida-carclaims
  environment: dev

frontend:
  enabled: true
  replicas: 1
  image:
    repository: quay.io/mklaasse/frida-carclaims-frontend
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  route:
    enabled: true
    host: ""
    tls:
      termination: edge

backend:
  enabled: true
  replicas: 1
  serviceName: frida-carclaims-dev
  image:
    repository: quay.io/mklaasse/frida-carclaims-backend-ai
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  secrets:
    name: voice-backend-secrets
  config:
    chatBaseUrl: "https://litellm-litemaas.apps.prod.rhoai.rh-aiservices-bu.com/v1/"
    chatModel: "Qwen3.6-35B-A3B"
    chatTimeout: "120s"
    # Audio transcription configuration (OpenAI-compatible)
    transcriptionBaseUrl: "https://api.openai.com/v1/"
    transcriptionModel: "whisper-1"
    logLevelClickKlaassen: "ERROR"
    logLevelLangchain4j: "ERROR"
    httpAccessLogEnabled: "false"

