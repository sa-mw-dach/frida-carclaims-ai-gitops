{{- if .Values.whisper.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
  namespace: {{ include "frida-carclaims.namespace" . }}
  labels:
    app: whisper
    {{- include "frida-carclaims.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.whisper.replicas }}
  selector:
    matchLabels:
      app: whisper
  template:
    metadata:
      labels:
        app: whisper
    spec:
      initContainers:
        - name: download-model
          image: {{ .Values.whisper.initImage }}
          command:
            - sh
            - -c
            - |
              set -e
              MODEL={{ .Values.whisper.modelPath }}
              if [ -s "$MODEL" ]; then
                echo "Model already present: $(wc -c < "$MODEL") bytes"
                exit 0
              fi
              echo "Downloading ggml-small.bin from Hugging Face..."
              curl -fL --retry 3 --retry-delay 5 -o "$MODEL" \
                {{ .Values.whisper.modelUrl }}
              echo "Downloaded: $(wc -c < "$MODEL") bytes"
          volumeMounts:
            - name: whisper-model
              mountPath: /models
      containers:
        - name: whisper
          image: {{ .Values.whisper.image }}
          workingDir: /tmp/whisper
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: MODEL_PATH
              value: {{ .Values.whisper.modelPath | quote }}
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: TMPDIR
              value: /tmp/whisper
          volumeMounts:
            - name: whisper-model
              mountPath: /models
              readOnly: true
            - name: whisper-tmp
              mountPath: /tmp/whisper
          resources:
            {{- toYaml .Values.whisper.resources | nindent 12 }}
          startupProbe:
            tcpSocket:
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: whisper-model
          persistentVolumeClaim:
            claimName: whisper-model
        - name: whisper-tmp
          emptyDir: {}
{{- end }}
