{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.serviceName }}
  namespace: {{ include "frida-carclaims.namespace" . }}
  labels:
    app: voice-backend
    {{- include "frida-carclaims.labels" . | nindent 4 }}
spec:
  selector:
    app: voice-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
{{- end }}
