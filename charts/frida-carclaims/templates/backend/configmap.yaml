{{- if .Values.backend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-backend-config
  namespace: {{ include "frida-carclaims.namespace" . }}
  labels:
    app: voice-backend
    {{- include "frida-carclaims.labels" . | nindent 4 }}
data:
  CHAT_BASE_URL: {{ .Values.backend.config.chatBaseUrl | quote }}
  CHAT_MODEL: {{ .Values.backend.config.chatModel | quote }}
  CHAT_TIMEOUT: {{ .Values.backend.config.chatTimeout | quote }}
  TRANSCRIPTION_BASE_URL: {{ .Values.backend.config.transcriptionBaseUrl | quote }}
  TRANSCRIPTION_MODEL: {{ .Values.backend.config.transcriptionModel | quote }}
  QUARKUS_LOG_CATEGORY__CLICK_KLAASSEN__LEVEL: {{ .Values.backend.config.logLevelClickKlaassen | quote }}
  QUARKUS_LOG_CATEGORY__IO_QUARKIVERSE_LANGCHAIN4J__LEVEL: {{ .Values.backend.config.logLevelLangchain4j | quote }}
  QUARKUS_HTTP_ACCESS_LOG_ENABLED: {{ .Values.backend.config.httpAccessLogEnabled | quote }}
{{- end }}
