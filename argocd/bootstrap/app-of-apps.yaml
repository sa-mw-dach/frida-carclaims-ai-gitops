apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frida-carclaims-apps
  labels:
    app.kubernetes.io/part-of: frida-carclaims
spec:
  project: default
  source:
    repoURL: https://github.com/sa-mw-dach/frida-carclaims-ai-gitops.git
    targetRevision: main
    path: argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: frida-car-claims-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
