global:
  namespace: frida-carclaims-dev
  partOf: frida-carclaims
  environment: dev

frontend:
  image:
    repository: quay.io/mklaasse/frida-carclaims-frontend
    tag: latest

backend:
  serviceName: frida-carclaims-dev
  image:
    repository: quay.io/mklaasse/frida-carclaims-backend-ai
    tag: latest
  config:
    chatBaseUrl: "https://maas-rhdp.apps.maas.redhatworkshops.io/v1/"
    chatModel: "granite-3-2-8b-instruct"
    chatTimeout: "120s"
    transcriptionBaseUrl: "https://maas-rhdp.apps.maas.redhatworkshops.io/v1"
    transcriptionModel: "whisper-small"
    logLevelClickKlaassen: "WARN"
    logLevelLangchain4j: "WARN"
    httpAccessLogEnabled: "true"

